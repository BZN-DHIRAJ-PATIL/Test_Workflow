name: HDFC EPIL Workflow

on:
  workflow_dispatch:

jobs:
  run-converter:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Create Runtime Folders
        run: |
          mkdir -p INPUT OUTPUT SUCCESS FAILURE Log

      - name: Give Execute Permission
        run: chmod +x run.sh

      - name: Download Mail Attachment
        run: |
          python3 <<EOF
          import imaplib
          import email
          import os

          EMAIL = "${{ secrets.MAIL_USER }}"
          PASSWORD = "${{ secrets.MAIL_PASSWORD }}"

          print("Connecting to Gmail...")

          mail = imaplib.IMAP4_SSL("imap.gmail.com")

          mail.login(EMAIL, PASSWORD)

          print("Login successful")

          mail.select("INBOX")

          status, messages = mail.search(None, '(UNSEEN)')

          mail_ids = messages[0].split()

          print("MAIL IDS:", mail_ids)

          if not mail_ids:
              raise Exception("No unread emails found")

          latest_email_id = mail_ids[-1]

          status, msg_data = mail.fetch(latest_email_id, "(RFC822)")

          raw_email = msg_data[0][1]

          msg = email.message_from_bytes(raw_email)

          os.makedirs("INPUT", exist_ok=True)

          attachment_found = False

          for part in msg.walk():

              if part.get_content_disposition() == "attachment":

                  filename = part.get_filename()

                  print("ATTACHMENT FOUND:", filename)

                  if filename and (
                      filename.endswith(".xlsx")
                      or filename.endswith(".xls")
                      or filename.endswith(".csv")
                  ):

                      filepath = os.path.join("INPUT", filename)

                      with open(filepath, "wb") as f:
                          f.write(part.get_payload(decode=True))

                      print("Downloaded:", filename)
                      print("Saved To:", filepath)

                      attachment_found = True

          if not attachment_found:
              raise Exception("No valid attachment found in mailbox")

          mail.logout()

          print("Mail process completed successfully")

       EOF

      - name: Run Converter
        run: |
          sh run.sh

      - name: Display Logs
        run: |
          echo "===== CURRENT DIRECTORY ====="
          pwd

          echo "===== INPUT ====="
          ls -R INPUT || true

          echo "===== OUTPUT ====="
          ls -R OUTPUT || true

          echo "===== SUCCESS ====="
          ls -R SUCCESS || true

          echo "===== FAILURE ====="
          ls -R FAILURE || true

          echo "===== LOG ====="
          ls -R Log || true

          echo "===== LOG CONTENT ====="
          cat Log/* || true

      - name: Upload Output and Logs
        uses: actions/upload-artifact@v5
        with:
          name: HDFC-RESULT
          path: |
            OUTPUT/
            SUCCESS/
            FAILURE/
            Log/
            fileCounter.properties
```
